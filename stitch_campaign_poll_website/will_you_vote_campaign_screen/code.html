<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee8c2b",
                        "background-light": "#f8f7f6",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Will You Vote? Campaign Screen</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full max-w-[430px] mx-auto flex-col bg-background-light dark:bg-background-dark overflow-hidden shadow-2xl border-x border-primary/10">
<!-- Header -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<button class="text-primary hover:bg-primary/10 p-2 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Will You Vote?</h2>
</div>
<div class="flex-1 flex flex-col items-center justify-center px-6 text-center">
<!-- Candidate Profile Image / Placeholder -->
<div class="mb-8 relative">
<div class="w-32 h-32 rounded-full border-4 border-primary/20 p-1 bg-white dark:bg-slate-800 shadow-lg">
<img alt="Candidate portrait" class="w-full h-full rounded-full object-cover" data-alt="Young professional student wearing glasses smiling" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbEskUVET47FA_pSWMkqqWzLKORcSXHS6qMG006fxV6-ybL_1QJrf9UMXim5BI-IGLvGxeHnyUvTM0aiQLdZ8iUfAV-gPdfBYDglfyNSQuRAW0HCojJJR6aq4aMZwSMqKswpZewoUUEolmXqgqkBjTMUdF4TP0q5dz5dFVJx4o7KuZOi3113NYY2WTdTpzwz53NYH-m3ZZgfABDaq81zBhHn-TqQLcph3E0I32ybk1_Ho7hJUJXNiWTJH5WA6H6Oi-0mZ_qQcGrsY"/>
</div>
<div class="absolute -bottom-2 -right-2 bg-primary text-white p-2 rounded-full shadow-md flex items-center justify-center border-2 border-background-light">
<span class="material-symbols-outlined text-sm">verified</span>
</div>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight pb-3">
                Will you be voting for <span class="text-primary">Alex Chen</span>?
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-lg px-4">
                400L Software Engineering Senator Candidate
            </p>
<!-- Loader State -->
<div class="mt-12 mb-8 flex flex-col items-center gap-4 w-full max-w-[280px]">
<div class="relative flex items-center justify-center">
<!-- Spinning Arc Loader Simulation -->
<div class="w-10 h-10 rounded-full border-4 border-primary/20 border-t-primary animate-spin"></div>
</div>
<p class="text-primary font-medium text-sm tracking-wide uppercase">Updating election records...</p>
<div class="w-full h-1.5 bg-primary/10 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 45%;"></div>
</div>
</div>
<!-- Interaction Buttons -->
<div class="flex flex-col gap-4 w-full max-w-[340px] mt-4">
<button class="flex items-center justify-center gap-3 overflow-hidden rounded-xl h-16 px-6 bg-primary text-white text-lg font-bold shadow-lg shadow-primary/20 border-2 border-transparent active:scale-95 transition-all hover:bg-primary/90">
<span class="text-2xl">✅</span>
<span>Yes, I will!</span>
</button>
<button class="flex items-center justify-center gap-3 overflow-hidden rounded-xl h-16 px-6 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 text-lg font-bold shadow-sm border-2 border-primary/30 active:scale-95 transition-all hover:bg-primary/5">
<span class="text-2xl">🤔</span>
<span>Still deciding</span>
</button>
</div>
</div>
<!-- Quote/Message Card -->
<div class="px-6 mb-8">
<div class="bg-primary/5 dark:bg-primary/10 p-4 rounded-xl border border-primary/10 shadow-sm italic text-slate-700 dark:text-slate-300 text-center">
                "Together, let's build a smarter, more inclusive engineering community."
            </div>
</div>
<!-- Bottom Navigation -->
<div class="border-t border-primary/10 bg-background-light dark:bg-background-dark px-4 pb-8 pt-2">
<div class="flex gap-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">home</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-widest">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">groups</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-widest">Candidates</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">check_box</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-widest">Vote</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-widest">Profile</p>
</a>
</div>
</div>
<!-- Safe Area Home Indicator -->
<div class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</body></html>
